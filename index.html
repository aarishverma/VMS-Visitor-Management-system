<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-In — Visitor Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">🏛️</span>
      <span>VMS</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Check-In</a>
      <a href="visitors.html" class="nav-link">Visitor Log</a>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <div class="icon">📝</div>
    <h1>Visitor Check-In</h1>
    <p>Register a new visitor to the campus</p>
  </header>

  <main>

    <!-- Check-In Form Card -->
    <section class="card form-card">
      <h2 class="card-title">
        <span class="title-icon purple">✏️</span>
        Fill Visitor Details
      </h2>
      <form id="checkinForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter visitor name" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required />
          </div>
          <div class="form-group">
            <label for="purpose">Purpose of Visit</label>
            <input type="text" id="purpose" placeholder="e.g. Meeting, Delivery, Interview" required />
          </div>
          <div class="form-group">
            <label for="host">Host (Person to Meet)</label>
            <input type="text" id="host" placeholder="Enter host name" required />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            ✓ Check In Visitor
          </button>
          <button type="reset" class="btn btn-secondary">
            ✕ Clear Form
          </button>
        </div>
      </form>

      <!-- Success message (shown after check-in) -->
      <div id="successBox" class="success-box" style="display:none;">
        <div class="success-icon">✓</div>
        <h3>Visitor Checked In!</h3>
        <p id="successMsg"></p>
        <div class="success-actions">
          <button class="btn btn-primary" onclick="resetForm()">Check-In Another</button>
          <a href="visitors.html" class="btn btn-outline">View Visitor Log →</a>
        </div>
      </div>
    </section>

    <!-- Quick Stats -->
    <section class="card stats-card">
      <div class="stats-grid">
        <div class="stat-block">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total Visitors</span>
        </div>
        <div class="stat-block">
          <span class="stat-number green" id="statIn">0</span>
          <span class="stat-label">Currently In</span>
        </div>
        <div class="stat-block">
          <span class="stat-number red" id="statOut">0</span>
          <span class="stat-label">Checked Out</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Footer -->
  <footer>
    <p>Visitor Management System &copy; 2026 — College Demo Project</p>
  </footer>

  <script src="checkin.js"></script>
</body>
</html>
